<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Converter</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        font-family: 'Segoe UI', 'Noto Sans KR', sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      .wrap {
        max-width: 920px;
        margin: 0 auto;
        padding: 24px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 22px;
      }
      .subtitle {
        margin: 0 0 16px;
        color: #cbd5e1;
      }
      .card {
        background: #111827;
        border: 1px solid #334155;
        border-radius: 10px;
        padding: 16px;
        margin-bottom: 12px;
      }
      .field {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-top: 10px;
      }
      .field label {
        width: 110px;
        color: #cbd5e1;
      }
      .field input[type='text'] {
        flex: 1;
        min-width: 0;
        background: #0b1220;
        color: #e2e8f0;
        border: 1px solid #334155;
        border-radius: 6px;
        padding: 8px 10px;
      }
      button {
        border: 1px solid #475569;
        background: #1e293b;
        color: #e2e8f0;
        border-radius: 6px;
        padding: 8px 12px;
        cursor: pointer;
      }
      button:hover {
        background: #334155;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-top: 14px;
      }
      .status {
        color: #93c5fd;
      }
      .log {
        margin-top: 8px;
        padding: 10px;
        background: #020617;
        border: 1px solid #334155;
        border-radius: 6px;
        min-height: 120px;
        white-space: pre-wrap;
      }
      .hidden {
        display: none;
      }
      .policy {
        margin-top: 8px;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1 id="title">컨버터</h1>
      <p id="subtitle" class="subtitle"></p>

      <section class="card">
        <div class="field">
          <label id="source-label" for="source-path">원본 파일</label>
          <input id="source-path" type="text" readonly />
          <button id="select-source" type="button">원본 선택...</button>
        </div>

        <div class="field">
          <label id="output-label" for="output-path">출력 폴더</label>
          <input id="output-path" type="text" readonly />
          <button id="select-output" type="button">출력 폴더 선택...</button>
        </div>

        <div class="row">
          <button id="start-convert" type="button">변환 시작</button>
          <span id="status" class="status"></span>
        </div>

        <div class="row">
          <input id="policy-agree" type="checkbox" />
          <label id="policy-label" for="policy-agree"></label>
        </div>
      </section>

      <section class="card">
        <strong id="log-title">로그</strong>
        <pre id="log-view" class="log"></pre>
      </section>

      <section class="card" id="policy-card">
        <strong id="policy-title"></strong>
        <p id="policy-body" class="policy"></p>
      </section>
    </main>

    <script src="./dist/renderer/converter.js"></script>
  </body>
</html>
