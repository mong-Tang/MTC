<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>컨버터</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        font-family: 'Segoe UI', 'Noto Sans KR', sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      .wrap {
        max-width: 920px;
        margin: 0 auto;
        padding: 24px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 22px;
      }
      p {
        margin: 0 0 16px;
        color: #cbd5e1;
      }
      .card {
        background: #111827;
        border: 1px solid #334155;
        border-radius: 10px;
        padding: 16px;
        margin-bottom: 12px;
      }
      ul {
        margin: 8px 0 0;
        padding-left: 18px;
      }
      li {
        margin: 6px 0;
      }
      .muted {
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>컨버터 (준비 중)</h1>
      <p>압축 포맷 변환 기능은 이 창에서 분리 개발합니다.</p>

      <section class="card">
        <strong>예정 범위</strong>
        <ul>
          <li>지원 포맷 판별</li>
          <li>임시폴더 해제 → 변환 → ZIP 재압축</li>
          <li>변환 로그 및 실패 원인 표시</li>
        </ul>
      </section>

      <section class="card">
        <strong>사용 고지</strong>
        <ul>
          <li>본 도구는 사용자에게 이용 권한이 있는 파일에 한해 사용해야 합니다.</li>
          <li>저작권 보호 콘텐츠의 무단 변환·배포는 금지됩니다.</li>
          <li>DRM 등 기술적 보호조치를 우회하는 용도로 사용할 수 없습니다.</li>
        </ul>
      </section>

      <p class="muted">※ 현재 버전은 창 골격만 제공하며, 실제 변환 실행 UI/로직은 다음 단계에서 연결합니다.</p>
    </main>
  </body>
</html>
